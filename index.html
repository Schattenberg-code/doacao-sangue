<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doação de sangue</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <section class="flex">
        <div id="container">
            <form action="" id="formulario">
                <fieldset>
                    <h3>Responda o formulário</h3>
                </fieldset>
                <fieldset>
                    <label class="label" for="nome">Nome:</label> <br>
                    <input class="input" type="text" id="nome" placeholder="Nome">
                    <div class="erro" id="erroNome"></div>
                </fieldset>

                <fieldset>
                    <label class="label" for="email">Email:</label> <br>
                    <input class="input" type="email" id="email" placeholder="Email">
                    <div class="erro" id="erroEmail"></div>
                </fieldset>

                <fieldset>
                    <label class="label" for="idade">Idade:</label> <br>
                    <input class="input" type="number" id="idade" placeholder="Idade">
                    <div class="erro" id="erroIdade"></div>
                </fieldset>

                <fieldset>
                    <label class="label" for="peso">Peso:</label> <br>
                    <input class="input" type="number" id="peso" placeholder="70KG">
                    <div class="erro" id="erroPeso"></div>
                </fieldset>

                <fieldset>
                    <label class="label" for="sangue">Tipo sanguíneio</label> <br>
                    <select class="input" name="sangue" id="sangue">
                        <option value="">Selecione</option>
                        <option value="O+">o+</option>
                        <option value="O-">o-</option>
                    </select>
                    <div class="erro" id="erroSangue"></div>
                </fieldset>

                <fieldset>
                    <label class="label" for="telefone">Telefone:</label> <br>
                    <input class="input" type="tel" id="telefone" placeholder="+55...">
                    <div class="erro" id="erroTelefone"></div>
                </fieldset>

                <fieldset>
                    <label class="label" for="cidade">Cidade</label> <br>
                    <input class="input" type="text" id="cidade" placeholder="cidade">
                    <div class="erro" id="erroCidade"></div>
                </fieldset>

                <fieldset>
                    <label class="label" for="estado">Estado:</label> <br>
                    <input class="input" type="text" id="estado" placeholder="Rio de janeiro">
                    <div class="erro" id="erroEstado"></div>
                </fieldset>

                <fieldset id="botaostick">
                    <button id="enviar" type="submit">Enviar</button>
                </fieldset>
            </form>
        </div>
    </section>

</body>
    <script src="script.js"></script>
</html>
